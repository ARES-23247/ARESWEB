name = "aresweb"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"
placement = { mode = "smart" }

[vars]
ENVIRONMENT = "production"


[[d1_databases]]
binding = "DB"
database_name = "ares-db"
database_id = "24d5e2b3-5ad5-4e17-9c73-76b9a0030d16"
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "ARES_STORAGE"
bucket_name = "ares-media"

# Onshape OAuth state storage (Phase 78)
[[kv_namespaces]]
binding = "ONSHAPE_OAUTH_STATE"
id = "c2bbc88f81a44f80979f3a39d73369ec"
preview_id = "c2bbc88f81a44f80979f3a39d73369ec"

# Onshape export state storage (Phase 78-03)
[[kv_namespaces]]
binding = "ONSHAPE_EXPORTS"
id = "61193c8b86c540b0ad546dd3a91c231c"
preview_id = "61193c8b86c540b0ad546dd3a91c231c"

# Onshape OAuth Environment Variables (Phase 78)
# Required secrets (add via `wrangler secret put` or Cloudflare dashboard):
#   ONSHAPE_CLIENT_ID - Onshape OAuth application client ID
#   ONSHAPE_CLIENT_SECRET - Onshape OAuth application client secret
# Optional vars (can be set in wrangler.toml or via secrets):
#   ONSHAPE_REDIRECT_URI - OAuth callback URL (default: https://aresweb.pages.dev/api/onshape/callback)
#   ONSHAPE_BASE_URL - Onshape API base URL (default: https://cad.onshape.com/api)
#

# PartyKit D1 binding for document snapshot persistence
# Shares the main D1 database for document snapshots (WR-05)
[[d1_databases]]
binding = "PK_DB"
database_name = "ares-db"
database_id = "24d5e2b3-5ad5-4e17-9c73-76b9a0030d16"  # Shared with main DB binding
migrations_dir = "drizzle"

# DEV_BYPASS removed from production config (security audit item #1).
# For local development, use: wrangler dev --var DEV_BYPASS:true

[env.preview]
[[env.preview.d1_databases]]
binding = "DB"
database_name = "ares-db-preview"
database_id = "09c4aafb-89fd-4735-930e-3ff8e2289c34"
migrations_dir = "drizzle"

[[env.preview.d1_databases]]
binding = "PK_DB"
database_name = "ares-db-preview"
database_id = "09c4aafb-89fd-4735-930e-3ff8e2289c34"
migrations_dir = "drizzle"

[[env.preview.r2_buckets]]
binding = "ARES_STORAGE"
bucket_name = "ares-media"

# Onshape OAuth state storage for preview environment
[[env.preview.kv_namespaces]]
binding = "ONSHAPE_OAUTH_STATE"
id = "c2bbc88f81a44f80979f3a39d73369ec"
preview_id = "c2bbc88f81a44f80979f3a39d73369ec"

# Onshape export state storage for preview environment
[[env.preview.kv_namespaces]]
binding = "ONSHAPE_EXPORTS"
id = "61193c8b86c540b0ad546dd3a91c231c"
preview_id = "61193c8b86c540b0ad546dd3a91c231c"

[env.preview.ai]
binding = "AI"

[[env.preview.vectorize]]
binding = "VECTORIZE_DB"
index_name = "ares_knowledge_base"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE_DB"
index_name = "ares_knowledge_base"
