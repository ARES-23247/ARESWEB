name = "aresweb"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"
placement = { mode = "smart" }

[[d1_databases]]
binding = "DB"
database_name = "ares-db"
database_id = "24d5e2b3-5ad5-4e17-9c73-76b9a0030d16"
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "ARES_STORAGE"
bucket_name = "ares-media"

# PartyKit D1 binding for document snapshot persistence
# Shares the main D1 database for document snapshots (WR-05)
[[d1_databases]]
binding = "PK_DB"
database_name = "ares-db"
database_id = "24d5e2b3-5ad5-4e17-9c73-76b9a0030d16"  # Shared with main DB binding
migrations_dir = "drizzle"

# DEV_BYPASS removed from production config (security audit item #1).
# For local development, use: wrangler dev --var DEV_BYPASS:true

[env.preview]
[[env.preview.d1_databases]]
binding = "DB"
database_name = "ares-db-preview"
database_id = "09c4aafb-89fd-4735-930e-3ff8e2289c34"
migrations_dir = "drizzle"

[[env.preview.d1_databases]]
binding = "PK_DB"
database_name = "ares-db-preview"
database_id = "09c4aafb-89fd-4735-930e-3ff8e2289c34"
migrations_dir = "drizzle"

[[env.preview.r2_buckets]]
binding = "ARES_STORAGE"
bucket_name = "ares-media"

[env.preview.ai]
binding = "AI"

[[env.preview.vectorize]]
binding = "VECTORIZE_DB"
index_name = "ares_knowledge_base"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE_DB"
index_name = "ares_knowledge_base"
