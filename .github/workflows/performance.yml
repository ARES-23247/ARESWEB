name: Performance Check

on:
  pull_request:
    paths:
      - 'src/**'
      - 'vite.config.ts'
      - 'package.json'

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - run: node scripts/check-bundle-size.mjs
