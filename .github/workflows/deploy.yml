name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
  pull_request:

env:
  PLAYWRIGHT_BROWSERS_PATH: 0

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Accessibility & Lint Audit
        run: npm run lint

      - name: Automated Vulnerability & SAST Check
        run: npm run audit:security

      - name: Component Tests (Vitest)
        run: npm run test

      - name: Build with Vite
        run: npm run build

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: E2E Tests (Playwright)
        run: npm run test:e2e

      - name: E2E Accessibility Tests (pa11y-ci)
        run: npx start-server-and-test "npx vite preview --port 4173 --strictPort" http://localhost:4173 "npm run pa11y"

      - name: Apply D1 Migrations
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply ares-db --remote
          packageManager: npm
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name aresweb --commit-dirty=true --branch ${{ github.head_ref || github.ref_name }}
          packageManager: npm
