name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Accessibility & Lint Audit
        run: npm run lint

      - name: Automated Vulnerability & SAST Check
        run: npm run audit:security

      - name: Component Tests (Vitest)
        run: npm run test

      - name: Build with Vite
        run: npm run build

      - name: E2E Accessibility Tests (pa11y-ci)
        run: npx start-server-and-test preview http://localhost:4173 "npm run pa11y"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name aresweb --commit-dirty=true --branch ${{ github.head_ref || github.ref_name }}
          packageManager: npm
