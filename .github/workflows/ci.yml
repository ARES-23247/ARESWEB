name: CI Testing

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run full E2E suite (Playwright & pa11y)'
        required: true
        type: boolean
        default: true

env:
  PLAYWRIGHT_BROWSERS_PATH: 0

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Accessibility & Lint Audit
        run: npm run lint

      - name: Automated Vulnerability & SAST Check
        run: npm run audit:security

      - name: Component Tests (Vitest)
        run: npm run test

      - name: Build with Vite
        run: npm run build

      - name: Check if Full Suite Should Run
        id: check_e2e
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run_e2e=${{ inputs.run_e2e }}" >> $GITHUB_OUTPUT
          elif [[ "$PR_TITLE" == *"[skip e2e]"* ]] || [[ "$PR_TITLE" == *"[hotfix]"* ]] || [[ "$PR_LABELS" == *"hotfix"* ]] || [[ "$PR_LABELS" == *"skip-e2e"* ]]; then
            echo "run_e2e=false" >> $GITHUB_OUTPUT
            echo "⏩ Skipping E2E and Pa11y tests for hotfix/fast-path."
          else
            echo "run_e2e=true" >> $GITHUB_OUTPUT
          fi

      - name: Cache Playwright
        if: steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright (Chromium only)
        if: steps.check_e2e.outputs.run_e2e == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS Dependencies
        if: steps.check_e2e.outputs.run_e2e == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: E2E Tests (Playwright)
        if: steps.check_e2e.outputs.run_e2e == 'true'
        run: npm run test:e2e

      - name: E2E Accessibility Tests (pa11y-ci)
        if: steps.check_e2e.outputs.run_e2e == 'true'
        run: npx start-server-and-test "npx vite preview --port 4173 --strictPort" http://localhost:4173 "npm run pa11y"

      - name: Deploy Preview to Cloudflare Pages
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
