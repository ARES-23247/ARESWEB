name: CI Testing

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run full E2E suite (Playwright)'
        required: true
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Install dependencies once with pnpm, cache node_modules as artifact
  # ──────────────────────────────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

  # ──────────────────────────────────────────────────────────────────────
  # Build, deploy preview, and run smoke tests in one job.
  # This avoids a separate smoke test job (saving ~60s runner spinup
  # + another npm ci + playwright install cycle). Node + pnpm are already
  # installed from the build step, so we just add Playwright browsers.
  # ──────────────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
            .vite
          key: ${{ runner.os }}-vite-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vite-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-vite-

      - name: Build with Vite
        env:
          VITE_DISABLE_PAGES_REDIRECT: "true"
        run: pnpm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Deploy Preview (migrations + seed + pages deploy)
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 migrations apply DB --env preview --remote
          npx wrangler d1 execute DB --env preview --remote --file=scripts/seed-test-data.sql
          DEPLOYMENT_URL=$(npx wrangler pages deploy dist --project-name aresweb --branch="${{ github.head_ref || format('master-ci-{0}', github.sha) }}" | grep -oP 'https://.*?\.pages\.dev' | head -1)
          echo "deployment-url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOYMENT_URL"

      - name: Wait for deployment to be ready
        run: |
          echo "Waiting for preview deployment to propagate..."
          timeout 60 bash -c 'until curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.deployment-url }}" | grep -q "200"; do sleep 2; done'
          echo "Preview deployment is ready!"

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployment ready!\n\n**URL:** ${{ steps.deploy.outputs.deployment-url }}\n\nAll tests will run against this deployed environment.`
            })

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-preview
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: E2E Smoke Tests
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview-url }}
        run: npx playwright test tests/e2e/smoke.spec.ts

      - name: Upload Smoke Test Report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: playwright-report/
          retention-days: 7

  # All non-E2E tests run in parallel against the deployed preview
  static-checks:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: TypeScript Type Check
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: pnpm run typecheck

      - name: Accessibility & Lint Audit
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: pnpm run lint

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Automated Vulnerability & SAST Check
        run: pnpm run audit:security

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Component Tests (Vitest)
        run: pnpm run test

  # Full E2E test suite - informational only
  e2e-playwright:
    name: E2E Playwright
    runs-on: ubuntu-latest
    needs: deploy-preview
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if Full Suite Should Run
        id: check_e2e
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run_e2e=${{ inputs.run_e2e }}" >> $GITHUB_OUTPUT
          elif [[ "$PR_TITLE" == *"[skip e2e]"* ]] || [[ "$PR_TITLE" == *"[hotfix]"* ]] || [[ "$PR_LABELS" == *"hotfix"* ]] || [[ "$PR_LABELS" == *"skip-e2e"* ]] || [[ "$COMMIT_MSG" == *"[skip e2e]"* ]] || [[ "$COMMIT_MSG" == *"[hotfix]"* ]]; then
            echo "run_e2e=false" >> $GITHUB_OUTPUT
            echo "⏩ Skipping E2E tests for hotfix/fast-path."
          else
            echo "run_e2e=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install pnpm
        if: steps.check_e2e.outputs.run_e2e == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Restore node_modules
        if: steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Playwright Tests (Shard ${{ matrix.shard }}/5)
        if: steps.check_e2e.outputs.run_e2e == 'true'
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview-url }}
        run: npx playwright test --shard=${{ matrix.shard }}/5

      - name: Upload Playwright Report (on failure)
        if: failure() && steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Test Artifacts (on failure)
        if: failure() && steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

      - name: Comment failure with debug info
        if: failure() && github.event_name == 'pull_request' && matrix.shard == 1
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **E2E Tests Failed**\n\n**Preview URL:** ${{ needs.deploy-preview.outputs.preview-url }}\n\n**Debug locally:**\n\`\`\`bash\nPREVIEW_URL=${{ needs.deploy-preview.outputs.preview-url }} npm run test:e2e:remote\n\`\`\`\n\nOr use debug mode:\n\`\`\`bash\nPREVIEW_URL=${{ needs.deploy-preview.outputs.preview-url }} npm run test:e2e:debug:remote\n\`\`\``
            })



  # Gate for production deployment - only runs on master after critical tests pass
  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests, deploy-preview, smoke-test]
    # Always run so we can check the status of dependent jobs
    if: always()
    outputs:
      all-passed: ${{ steps.check.outputs.all-passed }}
    steps:
      - name: Check test results
        id: check
        run: |
          # Critical tests must pass for production deploy
          # - static-checks: lint and typecheck
          # - unit-tests: component tests
          # - deploy-preview: deploy preview
          # - smoke-test: smoke tests
          # Other E2E tests (playwright shards) are informational
          if [ "${{ needs.static-checks.result }}" == "success" ] && \
             [ "${{ needs.unit-tests.result }}" == "success" ] && \
             [ "${{ needs.deploy-preview.result }}" == "success" ] && \
             [ "${{ needs.smoke-test.result }}" == "success" ]; then
            echo "all-passed=true" >> $GITHUB_OUTPUT
            echo "✅ Critical tests passed!"
            echo "  static-checks: ${{ needs.static-checks.result }}"
            echo "  unit-tests: ${{ needs.unit-tests.result }}"
            echo "  deploy-preview: ${{ needs.deploy-preview.result }}"
            echo "  smoke-test: ${{ needs.smoke-test.result }}"
            echo ""
            echo "ℹ️  Informational tests:"
            echo "  e2e-playwright: (mocked, not blocking)"
          else
            echo "all-passed=false" >> $GITHUB_OUTPUT
            echo "❌ Critical tests failed:"
            echo "  static-checks: ${{ needs.static-checks.result }}"
            echo "  unit-tests: ${{ needs.unit-tests.result }}"
            echo "  deploy-preview: ${{ needs.deploy-preview.result }}"
            echo "  smoke-test: ${{ needs.smoke-test.result }}"
            exit 1
          fi

  # Deploy to production - only runs on master after all tests pass
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-preview, test-gate]
    if: github.ref == 'refs/heads/master' && needs.test-gate.outputs.all-passed == 'true'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy Production (migrations + pages deploy)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 migrations apply DB --remote
          npx wrangler pages deploy dist --project-name aresweb

      - name: Post Deploy Status
        run: |
          echo "## 🚀 Production Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** master" >> $GITHUB_STEP_SUMMARY
          echo "**Preview URL:** ${{ needs.deploy-preview.outputs.preview-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Production:** https://aresweb.pages.dev" >> $GITHUB_STEP_SUMMARY
