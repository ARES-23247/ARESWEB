name: CI Testing

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run full E2E suite (Playwright & pa11y)'
        required: true
        type: boolean
        default: true

env:
  PLAYWRIGHT_BROWSERS_PATH: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Deploy preview first - all tests run against this
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build with Vite
        run: npm run build

      - name: Apply D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply ares-db --remote
          packageManager: npm

      # Use different branch names for PR vs master to avoid conflicts
      - name: Deploy Preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name aresweb --branch=${{ github.head_ref || format('master-ci-{0}', github.sha) }}
          packageManager: npm

      - name: Wait for deployment to be ready
        run: |
          echo "Waiting for preview deployment to propagate..."
          timeout 60 bash -c 'until curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.deployment-url }}" | grep -q "200"; do sleep 2; done'
          echo "Preview deployment is ready!"

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployment ready!\n\n**URL:** ${{ steps.deploy.outputs.deployment-url }}\n\nAll tests will run against this deployed environment.`
            })

  # All tests run in parallel against the deployed preview
  static-checks:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    needs: deploy-preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Accessibility & Lint Audit
        run: npm run lint

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: deploy-preview
    # Allow failure for security audit - dependency vulns are non-blocking
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Automated Vulnerability & SAST Check
        run: npm run audit:security

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: deploy-preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Component Tests (Vitest)
        run: npm run test

  e2e-playwright:
    name: E2E Playwright
    runs-on: ubuntu-latest
    needs: deploy-preview
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if Full Suite Should Run
        id: check_e2e
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run_e2e=${{ inputs.run_e2e }}" >> $GITHUB_OUTPUT
          elif [[ "$PR_TITLE" == *"[skip e2e]"* ]] || [[ "$PR_TITLE" == *"[hotfix]"* ]] || [[ "$PR_LABELS" == *"hotfix"* ]] || [[ "$PR_LABELS" == *"skip-e2e"* ]] || [[ "$COMMIT_MSG" == *"[skip e2e]"* ]] || [[ "$COMMIT_MSG" == *"[hotfix]"* ]]; then
            echo "run_e2e=false" >> $GITHUB_OUTPUT
            echo "⏩ Skipping E2E and Pa11y tests for hotfix/fast-path."
          else
            echo "run_e2e=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        if: steps.check_e2e.outputs.run_e2e == 'true'
        run: npm ci

      - name: Cache Playwright
        if: steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright (Chromium only)
        if: steps.check_e2e.outputs.run_e2e == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS Dependencies
        if: steps.check_e2e.outputs.run_e2e == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Playwright Tests (Shard ${{ matrix.shard }}/5)
        if: steps.check_e2e.outputs.run_e2e == 'true'
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview-url }}
        run: npx playwright test --shard=${{ matrix.shard }}/5

      - name: Upload Playwright Report (on failure)
        if: failure() && steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Test Artifacts (on failure)
        if: failure() && steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

      - name: Comment failure with debug info
        if: failure() && github.event_name == 'pull_request' && matrix.shard == 1
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **E2E Tests Failed**\n\n**Preview URL:** ${{ needs.deploy-preview.outputs.preview-url }}\n\n**Debug locally:**\n\`\`\`bash\nPREVIEW_URL=${{ needs.deploy-preview.outputs.preview-url }} npm run test:e2e:remote\n\`\`\`\n\nOr use debug mode:\n\`\`\`bash\nPREVIEW_URL=${{ needs.deploy-preview.outputs.preview-url }} npm run test:e2e:debug:remote\n\`\`\``
            })

  e2e-pa11y:
    name: E2E Accessibility (pa11y)
    runs-on: ubuntu-latest
    needs: deploy-preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if Full Suite Should Run
        id: check_e2e
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run_e2e=${{ inputs.run_e2e }}" >> $GITHUB_OUTPUT
          elif [[ "$PR_TITLE" == *"[skip e2e]"* ]] || [[ "$PR_TITLE" == *"[hotfix]"* ]] || [[ "$PR_LABELS" == *"hotfix"* ]] || [[ "$PR_LABELS" == *"skip-e2e"* ]] || [[ "$COMMIT_MSG" == *"[skip e2e]"* ]] || [[ "$COMMIT_MSG" == *"[hotfix]"* ]]; then
            echo "run_e2e=false" >> $GITHUB_OUTPUT
            echo "⏩ Skipping E2E and Pa11y tests for hotfix/fast-path."
          else
            echo "run_e2e=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        if: steps.check_e2e.outputs.run_e2e == 'true'
        run: npm ci

      - name: E2E Accessibility Tests (pa11y-ci)
        if: steps.check_e2e.outputs.run_e2e == 'true'
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview-url }}
        run: npx pa11y-ci
