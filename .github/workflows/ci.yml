name: CI Testing

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run full E2E suite (Playwright)'
        required: true
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Build, deploy preview, and run smoke tests in one job.
  # ──────────────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.deploy.outputs.details_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
            .vite
          key: ${{ runner.os }}-vite-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vite-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-vite-

      - name: Build with Vite
        run: pnpm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Deploy Preview to Firebase Hosting
        id: deploy
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          node -e "require('fs').writeFileSync('/tmp/gcp_key.json', process.env.SERVICE_ACCOUNT_KEY)"
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_key.json
          pnpm exec firebase hosting:channel:deploy preview-${{ github.event.number || github.sha }} --project aresfirst-portal --debug > output.txt 2>&1 || { cat output.txt; rm -f /tmp/gcp_key.json; exit 1; }
          rm -f /tmp/gcp_key.json
          cat output.txt
          URL=$(grep 'Channel URL' output.txt | grep -oE 'https://[^ ]+' | head -n 1)
          echo "details_url=$URL" >> $GITHUB_OUTPUT

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployment ready!\n\n**URL:** ${{ steps.deploy.outputs.details_url }}\n\nAll tests will run against this deployed environment.`
            })

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E Smoke Tests
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview-url }}
        run: pnpm exec playwright test e2e/navigation.spec.ts

      - name: Upload Smoke Test Report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: playwright-report/
          retention-days: 7

  # 1. Run unit/integration tests with Vitest
  fast-test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: pnpm run test

  # 2. Run ESLint code checks
  fast-lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('**/*.{ts,tsx}') }}
          restore-keys: |
            eslint-${{ runner.os }}-

      - name: Run ESLint
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: pnpm run lint --cache --cache-location .eslintcache

  # 3. Run TypeScript compiler typechecks
  fast-typecheck:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache TypeScript build info
        uses: actions/cache@v4
        with:
          path: tsconfig.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-

      - name: Run Type Checking
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npx tsc --noEmit

  # 4. Run security audit
  fast-security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Security Audit
        run: pnpm audit --audit-level=high

  # Full E2E test suite - informational only
  e2e-playwright:
    name: E2E Playwright
    runs-on: ubuntu-latest
    needs: deploy-preview
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if Full Suite Should Run
        id: check_e2e
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run_e2e=${{ inputs.run_e2e }}" >> $GITHUB_OUTPUT
          elif [[ "$PR_TITLE" == *"[skip e2e]"* ]] || [[ "$PR_TITLE" == *"[hotfix]"* ]] || [[ "$PR_LABELS" == *"hotfix"* ]] || [[ "$PR_LABELS" == *"skip-e2e"* ]] || [[ "$COMMIT_MSG" == *"[skip e2e]"* ]] || [[ "$COMMIT_MSG" == *"[hotfix]"* ]]; then
            echo "run_e2e=false" >> $GITHUB_OUTPUT
            echo "⏩ Skipping E2E tests for hotfix/fast-path."
          else
            echo "run_e2e=true" >> $GITHUB_OUTPUT
          fi

      - name: Install pnpm
        if: steps.check_e2e.outputs.run_e2e == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        if: steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.check_e2e.outputs.run_e2e == 'true'
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright Browsers
        if: steps.check_e2e.outputs.run_e2e == 'true'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.check_e2e.outputs.run_e2e == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright Tests (Shard ${{ matrix.shard }}/5)
        if: steps.check_e2e.outputs.run_e2e == 'true'
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview-url }}
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/5

      - name: Upload Playwright Report (on failure)
        if: failure() && steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Test Artifacts (on failure)
        if: failure() && steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

      - name: Comment failure with debug info
        if: failure() && github.event_name == 'pull_request' && matrix.shard == 1
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **E2E Tests Failed**\n\n**Preview URL:** ${{ needs.deploy-preview.outputs.preview-url }}\n\n**Debug locally:**\n\`\`\`bash\nPREVIEW_URL=${{ needs.deploy-preview.outputs.preview-url }} npm run test:e2e:remote\n\`\`\`\n\nOr use debug mode:\n\`\`\`bash\nPREVIEW_URL=${{ needs.deploy-preview.outputs.preview-url }} npm run test:e2e:debug:remote\n\`\`\``
            })



  # Gate for production deployment - only runs on master after critical tests pass
  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: [fast-test, fast-lint, fast-typecheck, fast-security, deploy-preview, smoke-test]
    # Always run so we can check the status of dependent jobs
    if: always()
    outputs:
      all-passed: ${{ steps.check.outputs.all-passed }}
    steps:
      - name: Check test results
        id: check
        run: |
          # Critical tests must pass for production deploy
          # - fast-test: unit/integration tests
          # - fast-lint: code quality checks
          # - fast-typecheck: compiler type safety
          # - fast-security: package vulnerability checks
          # - deploy-preview: deploy preview
          # - smoke-test: smoke tests
          # Other E2E tests (playwright shards) are informational
          if [ "${{ needs.fast-test.result }}" == "success" ] && \
             [ "${{ needs.fast-lint.result }}" == "success" ] && \
             [ "${{ needs.fast-typecheck.result }}" == "success" ] && \
             [ "${{ needs.fast-security.result }}" == "success" ] && \
             [ "${{ needs.deploy-preview.result }}" == "success" ] && \
             [ "${{ needs.smoke-test.result }}" == "success" ]; then
            echo "all-passed=true" >> $GITHUB_OUTPUT
            echo "✅ Critical tests passed!"
            echo "  fast-test: ${{ needs.fast-test.result }}"
            echo "  fast-lint: ${{ needs.fast-lint.result }}"
            echo "  fast-typecheck: ${{ needs.fast-typecheck.result }}"
            echo "  fast-security: ${{ needs.fast-security.result }}"
            echo "  deploy-preview: ${{ needs.deploy-preview.result }}"
            echo "  smoke-test: ${{ needs.smoke-test.result }}"
            echo ""
            echo "ℹ️  Informational tests:"
            echo "  e2e-playwright: (mocked, not blocking)"
          else
            echo "all-passed=false" >> $GITHUB_OUTPUT
            echo "❌ Critical tests failed:"
            echo "  fast-test: ${{ needs.fast-test.result }}"
            echo "  fast-lint: ${{ needs.fast-lint.result }}"
            echo "  fast-typecheck: ${{ needs.fast-typecheck.result }}"
            echo "  fast-security: ${{ needs.fast-security.result }}"
            echo "  deploy-preview: ${{ needs.deploy-preview.result }}"
            echo "  smoke-test: ${{ needs.smoke-test.result }}"
            exit 1
          fi

  # Deploy to production - only runs on master after all tests pass
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-preview, test-gate]
    if: github.ref == 'refs/heads/master' && needs.test-gate.outputs.all-passed == 'true'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Build Cloud Functions
        run: |
          cd functions
          npm ci
          npm run build

      - name: Deploy Production to Firebase
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          node -e "require('fs').writeFileSync('/tmp/gcp_key.json', process.env.SERVICE_ACCOUNT_KEY)"
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_key.json
          pnpm exec firebase deploy --only hosting,functions --project aresfirst-portal --debug || { rm -f /tmp/gcp_key.json; exit 1; }
          rm -f /tmp/gcp_key.json

      - name: Post Deploy Status
        run: |
          echo "## 🚀 Production Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** master" >> $GITHUB_STEP_SUMMARY
          echo "**Preview URL:** ${{ needs.deploy-preview.outputs.preview-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Production:** https://aresfirst-portal.web.app" >> $GITHUB_STEP_SUMMARY
