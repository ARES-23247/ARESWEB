name: CI Testing

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run full E2E suite (Playwright)'
        required: true
        type: boolean
        default: true

env:
  PLAYWRIGHT_BROWSERS_PATH: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Deploy preview first - all tests run against this
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build with Vite
        env:
          VITE_DISABLE_PAGES_REDIRECT: "true"
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Apply D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply DB --env preview --remote
          packageManager: npm

      - name: Seed Test Data
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute DB --env preview --remote --file=scripts/seed-test-data.sql
          packageManager: npm

      # Use different branch names for PR vs master to avoid conflicts
      - name: Deploy Preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name aresweb --branch=${{ github.head_ref || format('master-ci-{0}', github.sha) }}
          packageManager: npm

      - name: Wait for deployment to be ready
        run: |
          echo "Waiting for preview deployment to propagate..."
          timeout 60 bash -c 'until curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.deployment-url }}" | grep -q "200"; do sleep 2; done'
          echo "Preview deployment is ready!"

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployment ready!\n\n**URL:** ${{ steps.deploy.outputs.deployment-url }}\n\nAll tests will run against this deployed environment.`
            })

  # All tests run in parallel against the deployed preview
  static-checks:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    needs: deploy-preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Accessibility & Lint Audit
        run: npm run lint

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: deploy-preview
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Automated Vulnerability & SAST Check
        run: npm run audit:security

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: deploy-preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Component Tests (Vitest)
        run: npm run test

  # Smoke tests - critical blocking tests for public routes
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Cache Playwright
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Smoke Tests (against deployed preview)
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview-url }}
        run: npx playwright test tests/e2e/smoke.spec.ts

      - name: Upload Playwright Report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: playwright-report/
          retention-days: 7

  # Full E2E test suite - informational only (uses mocked data)
  e2e-playwright:
    name: E2E Playwright
    runs-on: ubuntu-latest
    needs: deploy-preview
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if Full Suite Should Run
        id: check_e2e
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run_e2e=${{ inputs.run_e2e }}" >> $GITHUB_OUTPUT
          elif [[ "$PR_TITLE" == *"[skip e2e]"* ]] || [[ "$PR_TITLE" == *"[hotfix]"* ]] || [[ "$PR_LABELS" == *"hotfix"* ]] || [[ "$PR_LABELS" == *"skip-e2e"* ]] || [[ "$COMMIT_MSG" == *"[skip e2e]"* ]] || [[ "$COMMIT_MSG" == *"[hotfix]"* ]]; then
            echo "run_e2e=false" >> $GITHUB_OUTPUT
            echo "⏩ Skipping E2E tests for hotfix/fast-path."
          else
            echo "run_e2e=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        if: steps.check_e2e.outputs.run_e2e == 'true'
        run: npm ci

      - name: Cache Playwright
        if: steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright (Chromium only)
        if: steps.check_e2e.outputs.run_e2e == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS Dependencies
        if: steps.check_e2e.outputs.run_e2e == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Playwright Tests (Shard ${{ matrix.shard }}/5)
        if: steps.check_e2e.outputs.run_e2e == 'true'
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview-url }}
        run: npx playwright test --shard=${{ matrix.shard }}/5

      - name: Upload Playwright Report (on failure)
        if: failure() && steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Test Artifacts (on failure)
        if: failure() && steps.check_e2e.outputs.run_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

      - name: Comment failure with debug info
        if: failure() && github.event_name == 'pull_request' && matrix.shard == 1
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **E2E Tests Failed**\n\n**Preview URL:** ${{ needs.deploy-preview.outputs.preview-url }}\n\n**Debug locally:**\n\`\`\`bash\nPREVIEW_URL=${{ needs.deploy-preview.outputs.preview-url }} npm run test:e2e:remote\n\`\`\`\n\nOr use debug mode:\n\`\`\`bash\nPREVIEW_URL=${{ needs.deploy-preview.outputs.preview-url }} npm run test:e2e:debug:remote\n\`\`\``
            })



  # Gate for production deployment - only runs on master after critical tests pass
  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests, e2e-smoke]
    # Always run so we can check the status of dependent jobs
    if: always()
    outputs:
      all-passed: ${{ steps.check.outputs.all-passed }}
    steps:
      - name: Check test results
        id: check
        run: |
          # Critical tests must pass for production deploy
          # - static-checks: lint and typecheck
          # - unit-tests: component tests
          # - e2e-smoke: smoke tests against deployed preview
          # Other E2E tests (playwright) are informational
          if [ "${{ needs.static-checks.result }}" == "success" ] && \
             [ "${{ needs.unit-tests.result }}" == "success" ] && \
             [ "${{ needs.e2e-smoke.result }}" == "success" ]; then
            echo "all-passed=true" >> $GITHUB_OUTPUT
            echo "✅ Critical tests passed!"
            echo "  static-checks: ${{ needs.static-checks.result }}"
            echo "  unit-tests: ${{ needs.unit-tests.result }}"
            echo "  e2e-smoke: ${{ needs.e2e-smoke.result }}"
            echo ""
            echo "ℹ️  Informational tests:"
            echo "  e2e-playwright: ${{ needs.e2e-playwright.result }} (mocked, not blocking)"
          else
            echo "all-passed=false" >> $GITHUB_OUTPUT
            echo "❌ Critical tests failed:"
            echo "  static-checks: ${{ needs.static-checks.result }}"
            echo "  unit-tests: ${{ needs.unit-tests.result }}"
            echo "  e2e-smoke: ${{ needs.e2e-smoke.result }}"
            exit 1
          fi

  # Deploy to production - only runs on master after all tests pass
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-preview, test-gate]
    if: github.ref == 'refs/heads/master' && needs.test-gate.outputs.all-passed == 'true'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Apply D1 Migrations (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply DB --remote
          packageManager: npm

      - name: Deploy to Production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name aresweb
          packageManager: npm

      - name: Post Deploy Status
        run: |
          echo "## 🚀 Production Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** master" >> $GITHUB_STEP_SUMMARY
          echo "**Preview URL:** ${{ needs.deploy-preview.outputs.preview-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Production:** https://aresweb.pages.dev" >> $GITHUB_STEP_SUMMARY

